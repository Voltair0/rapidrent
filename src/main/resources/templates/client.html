<!doctype html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title th:text="${pageTitle}">Client</title><link rel="stylesheet" href="/css/rapidrent.css"></head>
<body>
<header class="topbar">
  <div class="container nav">
    <a class="logo" href="/ui"><span class="logo-mark">R</span><span>RapidRent</span></a>
    <nav class="nav-links">
      <a class="nav-link" href="/ui">Acasă</a>
      <a class="nav-link" href="/ui/cars">Mașini</a>
      <a class="nav-link" href="/ui/provider" data-role="ROLE_FURNIZOR">Furnizor</a>
      <a class="nav-link" href="/ui/admin" data-role="ROLE_ADMIN">Admin</a>
      <a class="nav-link" href="/ui/login" data-auth-label>Autentificare</a>
      <a class="nav-link hidden" href="#" data-logout>Ieșire</a>
    </nav>
  </div>
</header>
<main class="section" id="clientPage">
  <div class="container panel-layout">
    <aside class="sidebar"><div class="card"><a class="side-link active" href="/ui/client">Rezervările mele</a><a class="side-link" href="/ui/verification">Verificare cont</a><a class="side-link" href="/ui/cars">Caută mașini</a></div></aside>
    <section class="form-stack">
      <div class="card"><h1>Bun venit, <span id="clientName"></span></h1><p class="muted">Status documente: <strong id="documentStatus"></strong></p><div id="clientAlert" class="alert"></div></div>
      <div class="card"><h2>Istoric rezervări</h2><div style="overflow:auto"><table class="table"><thead><tr><th>ID</th><th>Mașină</th><th>Locație</th><th>Perioadă</th><th>Total</th><th>Status</th><th>Acțiuni</th></tr></thead><tbody id="reservationRows"><tr><td colspan="7">Se încarcă...</td></tr></tbody></table></div></div>
      <div class="card"><h2>Schimbare parolă</h2><form id="changePasswordForm" class="form-stack"><input class="input" name="oldPassword" type="password" placeholder="Parola veche" required><input class="input" name="newPassword" type="password" placeholder="Parola nouă" required><button class="btn btn-primary" type="submit">Schimbă parola</button></form></div>
    </section>
  </div>
</main>
<script src="/js/rapidrent.js"></script>
</body></html>
