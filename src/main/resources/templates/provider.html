<!doctype html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title th:text="${pageTitle}">Furnizor</title><link rel="stylesheet" href="/css/rapidrent.css"></head>
<body>
<header class="topbar">
  <div class="container nav">
    <a class="logo" href="/ui"><span class="logo-mark">R</span><span>RapidRent</span></a>
    <nav class="nav-links">
      <a class="nav-link" href="/ui">Acasă</a>
      <a class="nav-link" href="/ui/cars">Mașini</a>
      <a class="nav-link" href="/ui/provider" data-role="ROLE_FURNIZOR">Furnizor</a>
      <a class="nav-link" href="/ui/admin" data-role="ROLE_ADMIN">Admin</a>
      <a class="nav-link" href="/ui/login" data-auth-label>Autentificare</a>
      <a class="nav-link hidden" href="#" data-logout>Ieșire</a>
    </nav>
  </div>
</header>
<main class="section" id="providerPage">
  <div class="container panel-layout">
    <aside class="sidebar"><div class="card"><a class="side-link active" href="/ui/provider">Dashboard</a><a class="side-link" href="/ui/provider/cars/new">Adaugă mașină</a><a class="side-link" href="/ui/cars">Vezi site-ul</a></div></aside>
    <section class="form-stack">
      <div class="card"><h1>Dashboard furnizor: <span id="providerName"></span></h1><div id="providerAlert" class="alert"></div></div>
      <div class="kpi-grid"><div class="kpi"><div class="muted">Mașini listate</div><div class="kpi-value" id="providerCarsCount">0</div></div><div class="kpi"><div class="muted">Venit net estimat</div><div class="kpi-value" id="providerIncome">0 RON</div></div><div class="kpi"><div class="muted">Comision platformă</div><div class="kpi-value">10%</div></div></div>
      <div class="card">
        <div class="section-title"><h2>Flota mea</h2><a class="btn btn-primary" href="/ui/provider/cars/new">Adaugă mașină</a></div>
        <div style="overflow:auto">
          <table class="table">
            <thead>
              <tr><th>ID</th><th>Mașină</th><th>Locație</th><th>Preț/zi</th><th>Status</th><th>Acțiuni</th></tr>
            </thead>
            <tbody id="providerCarRows">
              <tr><td colspan="6">Se încarcă...</td></tr>
            </tbody>
          </table>
        </div>
      </div>  
    </section>
  </div>
</main>
<script src="/js/rapidrent.js"></script>
</body></html>
