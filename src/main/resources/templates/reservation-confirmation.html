<!doctype html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title th:text="${pageTitle}">Confirmare</title><link rel="stylesheet" href="/css/rapidrent.css"></head>
<body>
<header class="topbar">
  <div class="container nav">
    <a class="logo" href="/ui"><span class="logo-mark">R</span><span>RapidRent</span></a>
    <nav class="nav-links">
      <a class="nav-link" href="/ui">Acasă</a>
      <a class="nav-link" href="/ui/cars">Mașini</a>
      <a class="nav-link" href="/ui/provider" data-role="ROLE_FURNIZOR">Furnizor</a>
      <a class="nav-link" href="/ui/admin" data-role="ROLE_ADMIN">Admin</a>
      <a class="nav-link" href="/ui/login" data-auth-label>Autentificare</a>
      <a class="nav-link hidden" href="#" data-logout>Ieșire</a>
    </nav>
  </div>
</header>
<main class="container auth-wrap">
  <section class="card auth-card" style="text-align:center">
    <div class="feature-icon" style="margin:0 auto 16px">✅</div>
    <h1>Rezervare confirmată</h1>
    <p class="muted" id="reservationMessage">Rezervarea ta a fost procesată.</p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:24px"><a class="btn btn-primary" href="/ui/client">Vezi contul meu</a><a class="btn btn-ghost" href="/ui/cars">Caută altă mașină</a></div>
  </section>
</main>
<script src="/js/rapidrent.js"></script>
</body></html>
